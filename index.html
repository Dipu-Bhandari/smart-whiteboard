<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gravity Canvas - Smart Whiteboard</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <!-- Tesseract.js CDN (OCR) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <div id="container">
        <!-- Canvas for drawing -->
        <canvas id="canvas"></canvas>
        
        <!-- Start Overlays -->
        <div id="start-overlay" class="glass-panel">
            <h1>🎨 Trackpad Whiteboard</h1>
            <p><strong>Glide</strong> your finger to move the cursor.</p>
            <p><strong>Hold Spacebar</strong> on the keyboard to Write/Erase.</p>
            <p>(Or just click and drag normally!)</p>
            <p style="color: #48bfe3; font-weight: bold; margin-top: 10px;">Select Eraser from the toolbar manually.</p>
            <button id="start-btn">Start Creating</button>
        </div>

        <!-- UI Toolbars (hidden initially) -->
        <div id="ui-container" class="hidden">
            <!-- Left Toolbar -->
            <div class="toolbar left-toolbar glass-panel">
                <h3>Tools</h3>
                <button class="tool-btn active" data-tool="pen">✏️ Pen</button>
                <button class="tool-btn" data-tool="eraser">🧽 Eraser</button>
                <button class="tool-btn action-btn" id="btn-extract" style="background: rgba(72,191,227,0.3);">🤖 Read Text</button>
                <button class="tool-btn action-btn" id="btn-clear" style="margin-top: 5px;">🗑️ Clear All</button>
            </div>
            
            <!-- Bottom Toolbar -->
            <div class="toolbar bottom-toolbar glass-panel">
                <div class="color-picker-container">
                    <button class="color-btn active" style="--btn-color: #ff3366;" data-color="#ff3366"></button>
                    <button class="color-btn" style="--btn-color: #00f0ff;" data-color="#00f0ff"></button>
                    <button class="color-btn" style="--btn-color: #00ff66;" data-color="#00ff66"></button>
                    <button class="color-btn" style="--btn-color: #ff9900;" data-color="#ff9900"></button>
                    <button class="color-btn" style="--btn-color: #0f1015;" data-color="#0f1015"></button>
                    <button class="color-btn" style="--btn-color: #ffffff;" data-color="#ffffff"></button>
                    <input type="color" id="custom-color" value="#a020f0">
                </div>
            </div>

            <!-- Right Toolbar -->
            <div class="toolbar right-toolbar glass-panel">
                <h3>Environment</h3>
                <div class="thickness-container" style="margin-bottom: 20px;">
                    <label>Canvas Pattern</label>
                    <select id="bg-selector" class="dropdown-ui">
                        <option value="dark">Void Black</option>
                        <option value="notebook">Ruled Notebook</option>
                    </select>
                </div>
                
                <h3>Physics</h3>
                <div class="toggle-container">
                    <span>Gravity</span>
                    <label class="switch">
                        <input type="checkbox" id="gravity-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="thickness-container">
                    <label>Stroke</label>
                    <input type="range" id="stroke-width" min="2" max="30" value="8">
                </div>
            </div>
        </div>

        <!-- Transcription Output Panel (hidden initially) -->
        <div id="transcription-panel" class="glass-panel hidden">
            <h3>AI Transcription</h3>
            <div id="ocr-status">Ready...</div>
            <textarea id="ocr-result" readonly placeholder="Your transcribed text will appear here..."></textarea>
            <button id="close-transcription">Close</button>
        </div>
        
        <!-- Virtual Cursor Indicator -->
        <div id="cursor"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
